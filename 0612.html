<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>爛番茄_我的時間我安排_SourceCode.zip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="0612.css">
</head>
<body>
    <h1>我的時間我安排</h1>

    <div id="app" class="container" style="max-width: 600px;">
        <h3 class="mb-4">代辦清單</h3>

        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-5">
                        <input type="text" class="form-control" placeholder="輸入代辦清單" v-model="name">
                    </div>
                    <div class="col-4">
                        <input type="number" class="form-control" placeholder="輸入時間(分鐘)" v-model="time">
                    </div>
                    <div class="col-3">
                        <button class="btn btn-primary w-100" v-on:click="add">新增</button>
                    </div>
                </div>
            </div>
        </div>

        <ul class="list-group">
            <li class="list-group-item" v-for="(item, index) in list" v-bind:key="index">
                
                <span>
                    <strong>{{ item.name }}</strong> 
                    <span class="badge bg-secondary ms-2">{{ item.time }} 分鐘</span>
                </span>

                <button class="btn btn-danger btn-sm" v-on:click="remove(index)">刪除</button>
            </li>
        </ul>

        <div v-if="list.length === 0" class="alert alert-warning mt-3 text-center">
            目前沒有資料，請新增代辦事項。
        </div>

    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        var app = Vue.createApp({
            // 資料模型
            data: function() {
                return {
                    name: '',
                    time: '',
                    list: [
                        { name: '測試格', time: 00 },
                    ]
                };
            },
            // 方法集
            methods: {
                // 新增資料的方法
                add() {
                    // 1. 簡單的防呆：如果欄位是空的，就不執行
                    if (this.name === '' || this.time === '') {
                        alert('請輸入完整的代辦事項與時間！');
                        return;
                    }

                    // 2. 將資料推入 (push) 陣列
                    this.list.push({
                        name: this.name,
                        time: this.time
                    });

                    // 3. UX 優化：新增完後，把輸入框清空
                    this.name = '';
                    this.time = '';
                },
                // 刪除資料的方法
                remove(index) {
                    // 使用 splice(開始位置, 刪除幾個)
                    this.list.splice(index, 1);
                }
            }
        });

        app.mount('#app');
    </script>
    
    <br></br>
    <h2>倒數計時器</h2>

<input type="number" id="minutes" min="1" placeholder="輸入分鐘">

<br><br>

<button onclick="startTimer()">開始</button>
<button onclick="resetTimer()">重設</button>

<div id="display">00:00</div>

<script>
let countdown;
let totalSeconds = 0;

function updateDisplay(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;

    document.getElementById("display").textContent =
        String(mins).padStart(2, "0") + ":" +
        String(secs).padStart(2, "0");
}

function startTimer() {
    clearInterval(countdown);

    const minutes = parseInt(document.getElementById("minutes").value);

    if (!minutes || minutes <= 0) {
        alert("請輸入大於 0 的分鐘數");
        return;
    }

    totalSeconds = minutes * 60;

    updateDisplay(totalSeconds);

    countdown = setInterval(() => {
        totalSeconds--;

        updateDisplay(totalSeconds);

        if (totalSeconds <= 0) {
            clearInterval(countdown);
            alert("時間到！");
        }
    }, 1000);
}

function resetTimer() {
    clearInterval(countdown);
    totalSeconds = 0;
    updateDisplay(0);
    document.getElementById("minutes").value = "";
}
</script>
</body>
</html>
